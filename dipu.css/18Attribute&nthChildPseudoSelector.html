<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute and nth-child Pseudo Selector</title>

    <style>
        .container{
            margin: 34px 23px;
            display: block;
            width: 240px;
            margin: auto;
        }
        input{
            display: block;
        }
        input[type="text"]{
            padding: 23px;
            border: 2px solid red;
        }
        a[target]{
            font-size: 34px;
            color: violet
        }
        a[target='_self']{
            font-size: 34px;
            color: blue
        }
        input[type='email']{
            color: yellow;
            border: 2px solid black;
        }

        li:nth-child(3){
            color: cyan;
        }
            
    </style>
</head>
<body>
    <div class="container">
        <h1><a href="http://google.com" target="_blank">Go to Google</a></h1>
        <h1><a href="http://facebook.com" target="_self">Go to Facebook</a></h1>
        <h1><a href="http://google.com" target="_blank">Go to Google</a></h1>
        <form action="" class="form-control">
            <input type="text" placeholder="Enter your name">
            <input type="password" placeholder="Enter your password">
            <input type="email" placeholder="Enter your email">
            <input type="submit" value="submit">
        </form>
        <ul>
            <li class="itam" id="itam1">Itam1</li>
            <li class="itam" id="itam2">Itam2</li>
            <li class="itam" id="itam3">Itam3</li>
            <li class="itam" id="itam4">Itam4</li>
            <li class="itam" id="itam5">Itam5</li>
            <li class="itam" id="itam6">Itam6</li>
            <li class="itam" id="itam7">Itam7</li>
            <li class="itam" id="itam8">Itam8</li>
            <li class="itam" id="itam9">Itam9</li>
        </ul>
    </div>
</body>
</html>
